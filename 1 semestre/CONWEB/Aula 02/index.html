<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="favicon-16x16.png" type="image/x-icon" />
    <title>Aula Imagens</title>
  </head>
  <body>
    <h1>Desafio das imagens</h1>
    <h2>Vila Velha -ES</h2>
    <img src="Vila_Velha_ES.png" alt="Vista da cidade de Vila Velha." />
    <figure>
      <img src="Vila_Velha.png" width="200" alt="Praia de Vila Velha" />
      <figcaption>Vista da praia de Vila Velha.</figcaption>
    </figure>
    <picture>
      <source media="(max-width: 760px)" srcset="Vila_Velha_P.png" />
      <img
        src="Vila_Velha_P.png"
        alt="Vista do convento da Penha em Vila Velha"
        width="100%"
      />
    </picture>
  </body>
</html>
