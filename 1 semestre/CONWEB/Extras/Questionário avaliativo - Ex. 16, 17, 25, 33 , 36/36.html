<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 36</title>
  </head>
  <body>
    <h1>Tabela de matérias</h1>
    <br />
    <table border="1">
      <thead>
        <tr>
          <th>Aluno</th>
          <th colspan="2">Matérias</th>
          <th>Médias</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th rowspan="4">Fulano</th>
          <th>Matemática</th>
          <td>Nota</td>
          <td rowspan="4">Média</td>
        </tr>
        <tr>
          <th>Ciências</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th>História</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th>Línguas</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th rowspan="4">Beltrano</th>
          <th>Matemática</th>
          <td>Nota</td>
          <td rowspan="4">Média</td>
        </tr>
        <tr>
          <th>Ciências</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th>História</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th>Línguas</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th rowspan="4">Ciclano</th>
          <th>Matemática</th>
          <td>Nota</td>
          <td rowspan="4">Média</td>
        </tr>
        <tr>
          <th>Ciências</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th>História</th>
          <td>Nota</td>
        </tr>
        <tr>
          <th>Línguas</th>
          <td>Nota</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th colspan="3">Média geral</th>
          <td>Média</td>
        </tr>
      </tfoot>
    </table>
    <br />
    <hr />
  </body>
</html>
