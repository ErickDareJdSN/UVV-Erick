<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Quiz de cores</title>
</head>

<body>

    <h1 id="titulo">Qual a melhor cor do mundo?</h1>

    <button id="botaoF1">Verde</button>
    <button id="botaoV">Azul</button>
    <button id="botaoF2">Vermelho</button>
    <button id="botaoF3">Amarelo</button>
    <br><br>
    <button id="reset">Reiniciar</button>

</body>

<script>
    const titulo = document.getElementById("titulo");
    const botaoF1 = document.getElementById("botaoF1");
    const botaoF2 = document.getElementById("botaoF2");
    const botaoF3 = document.getElementById("botaoF3");
    const botaoV = document.getElementById("botaoV");
    const reset = document.getElementById("reset");

    botaoF1.addEventListener("click", function () {
        titulo.textContent = "Errado!";
        titulo.style.color = "rgb(255, 0, 0)";
    });

    botaoF2.addEventListener("click", function () {
        titulo.textContent = "Errado!";
        titulo.style.color = "rgb(255, 0, 0)";
    });

    botaoF3.addEventListener("click", function () {
        titulo.textContent = "Errado!";
        titulo.style.color = "rgb(255, 0, 0)";
    });

    botaoV.addEventListener("click", function () {
        titulo.textContent = "Correto!";
        titulo.style.color = "rgb(0, 255, 0)";
    });

    reset.addEventListener("click", function () {
        titulo.textContent = "Qual a melhor cor do mundo?";
        titulo.style.color = "rgb(0, 0, 0)";
    });
</script>

</html>
